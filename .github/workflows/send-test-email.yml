name: send-test-email

on:
  workflow_dispatch:
    inputs:
      price:
        description: Current Jet2 holiday price
        required: true
        type: string

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send test price email
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TEST_PRICE: ${{ inputs.price }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage

          price = os.environ["TEST_PRICE"]
          msg = EmailMessage()
          msg["Subject"] = f"Jet2 price tracker test - {price}"
          msg["From"] = os.environ["EMAIL_FROM"]
          msg["To"] = os.environ["EMAIL_TO"]
          msg.set_content(
              "Your Jet2 price tracker test email is working.\n\n"
              f"Current holiday price: {price} total\n\n"
              "Pickalbatros Palais des Roses Agadir, 7 nights from 23 August 2026.\n"
              "The live price was read using your home connection because Jet2 blocked "
              "the GitHub cloud runner."
          )

          with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as smtp:
              smtp.login(os.environ["EMAIL_FROM"], "".join(os.environ["GMAIL_APP_PASSWORD"].split()))
              smtp.send_message(msg)
          print("Test email sent.")
          PY
